<svg xmlns="http://www.w3.org/2000/svg" width="100" height="30">
  <style>
    .text { 
      fill: #c9d1d9; 
      font-family: monospace, sans-serif; 
      font-size: 20px; 
      font-weight: bold; 
    }
    .cyan { fill: #00ffff; }
    
    .lenses {
      animation: blink 4s infinite;
    }

    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.1); }
    }
  </style>
  <text x="5" y="22" class="text">(</text>
  <text x="15" y="22" class="text cyan">⌐</text>
  <text x="30" y="22" class="text cyan lenses" style="transform-origin: 35px 15px;">■</text>
  <text x="45" y="22" class="text">_</text>
  <text x="60" y="22" class="text cyan lenses" style="transform-origin: 65px 15px;">■</text>
  <text x="75" y="22" class="text">)</text>
</svg>
